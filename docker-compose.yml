
services:
  postgres:
    image: postgres:16-alpine
    container_name: auction_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: auction_db
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
